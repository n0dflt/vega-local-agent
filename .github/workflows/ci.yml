name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-matrix:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python:
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Compile source and tests
        run: python -m compileall -q core tools permissions plugins domains workflows planner memory rag scripts tests

      - name: Run full suite
        run: python -m pytest -q -rs -p no:cacheprovider --basetemp .tmp/pytest-ci --tb=short

  release-gate:
    name: Release gate / Ubuntu / Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run focused critical tests
        run: >-
          python -m pytest -q -rs -p no:cacheprovider
          --basetemp .tmp/pytest-critical --tb=short
          tests/test_execution_trace.py
          tests/test_runtime_diagnostics.py
          tests/test_state_integrity.py
          tests/test_release_consistency.py

      - name: Validate identity
        run: python scripts/check_identity.py

      - name: Validate production policy consistency
        run: python scripts/check_policy_consistency.py

      - name: Run smoke test
        run: python scripts/smoke_test.py

      - name: Run repository hygiene checks
        run: python scripts/check_repository_hygiene.py

      - name: Run built-in Release Manager checks
        run: python scripts/run_release_check.py
